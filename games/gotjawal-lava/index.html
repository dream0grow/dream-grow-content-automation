<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>곶자왈 용암에서 살아남기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #1a1010;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 30%, #3a1810, #120808);
  }
  #stage {
    position: relative;
    width: min(100vw, 177.7vh);
    aspect-ratio: 16 / 10;
    max-height: 100vh;
    box-shadow: 0 0 60px rgba(255,90,20,0.25);
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* ===== Overlays ===== */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 4%;
    color: #fff;
    z-index: 10;
  }
  .hidden { display: none !important; }

  /* Title */
  #titleScreen { background: linear-gradient(160deg, rgba(60,20,8,0.92), rgba(20,8,6,0.96)); }
  .game-title {
    font-size: clamp(28px, 5.2vw, 60px);
    font-weight: 900;
    color: #ffd24a;
    text-shadow: 0 3px 0 #b34700, 0 6px 18px rgba(255,80,0,0.5);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .game-sub { font-size: clamp(13px, 2.2vw, 20px); color: #ffb27a; margin-bottom: 22px; }
  .howto {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,200,120,0.35);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: clamp(12px, 2vw, 17px);
    line-height: 1.7;
    max-width: 560px;
    margin-bottom: 24px;
  }
  .howto b { color: #ffd24a; }
  .btn {
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: 14px 38px;
    font-size: clamp(16px, 2.6vw, 24px);
    font-weight: 800;
    color: #5a2200;
    background: linear-gradient(180deg, #ffe27a, #ffb12e);
    box-shadow: 0 5px 0 #c87400, 0 8px 16px rgba(0,0,0,0.3);
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #c87400; }
  .btn.green { color: #08340f; background: linear-gradient(180deg, #b6f06a, #5fc23a); box-shadow: 0 5px 0 #2f7a1f, 0 8px 16px rgba(0,0,0,0.3); }

  /* Quiz modal */
  #quizModal { background: rgba(10,6,4,0.78); backdrop-filter: blur(3px); }
  .quiz-card {
    background: linear-gradient(180deg, #fffdf5, #fff2d8);
    color: #3a2410;
    border-radius: 20px;
    padding: 22px 22px 18px;
    width: min(92%, 560px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.5);
    border: 4px solid #ffcf6b;
  }
  .quiz-topic {
    display: inline-block;
    background: #2f9e44; color: #fff;
    font-size: clamp(11px, 1.8vw, 14px); font-weight: 800;
    padding: 4px 14px; border-radius: 999px; margin-bottom: 12px;
  }
  .quiz-q { font-size: clamp(17px, 2.8vw, 24px); font-weight: 800; line-height: 1.45; margin-bottom: 16px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    cursor: pointer; text-align: left;
    border: 3px solid #ffd98a; background: #fff;
    border-radius: 14px; padding: 13px 16px;
    font-size: clamp(15px, 2.4vw, 20px); font-weight: 700; color: #3a2410;
    transition: transform .06s, background .1s, border-color .1s;
  }
  .quiz-opt:active { transform: scale(0.98); }
  .quiz-opt.correct { background: #d3f9d8; border-color: #2f9e44; }
  .quiz-opt.wrong { background: #ffe0e0; border-color: #e03131; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    margin-top: 14px; font-size: clamp(14px, 2.2vw, 18px); font-weight: 800;
    min-height: 1.2em;
  }
  .quiz-explain { margin-top: 6px; font-size: clamp(12px, 2vw, 16px); font-weight: 600; color: #6b5030; line-height: 1.5; }
  .quiz-next { margin-top: 14px; }

  /* End screen */
  #endScreen { background: linear-gradient(160deg, rgba(8,40,16,0.93), rgba(6,20,10,0.97)); }
  #endScreen.lose { background: linear-gradient(160deg, rgba(60,16,8,0.93), rgba(20,6,6,0.97)); }
  .end-title { font-size: clamp(26px, 4.6vw, 52px); font-weight: 900; margin-bottom: 6px; }
  .end-score { font-size: clamp(18px, 3vw, 28px); font-weight: 800; color: #ffe27a; margin-bottom: 14px; }
  .name-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .name-row input {
    border: 3px solid #ffcf6b; border-radius: 12px; padding: 10px 14px;
    font-size: clamp(14px, 2.2vw, 18px); width: 160px; text-align: center; font-weight: 700;
    background:#fff;
  }
  .rank-box {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px; padding: 12px 16px; width: min(92%, 420px);
    margin-bottom: 18px;
  }
  .rank-box h3 { font-size: clamp(14px, 2.2vw, 18px); color: #ffd24a; margin-bottom: 8px; }
  .rank-list { list-style: none; font-size: clamp(13px, 2vw, 16px); }
  .rank-list li { display: flex; justify-content: space-between; padding: 4px 2px; border-bottom: 1px dashed rgba(255,255,255,0.15); }
  .rank-list li.me { color: #b6f06a; font-weight: 900; }
  .rank-medal { width: 1.6em; display:inline-block; }

  /* Touch hop button */
  #hopBtn {
    position: absolute; right: 18px; bottom: 18px; z-index: 8;
    width: clamp(72px, 13vw, 104px); height: clamp(72px, 13vw, 104px);
    border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 35% 30%, #fff0b8, #ffb12e);
    box-shadow: 0 5px 0 #c87400, 0 8px 16px rgba(0,0,0,0.35);
    font-size: clamp(28px, 5vw, 44px); color: #6a3000; font-weight: 900;
  }
  #hopBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #c87400; }
  .toast {
    position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.78); color: #fff; font-weight: 800;
    padding: 10px 20px; border-radius: 999px; font-size: clamp(14px, 2.4vw, 20px);
    z-index: 9; opacity: 0; transition: opacity .25s, top .25s; pointer-events: none;
    border: 2px solid rgba(255,210,74,0.6);
  }
  .toast.show { opacity: 1; top: 9%; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="960" height="600"></canvas>

    <!-- Touch hop button -->
    <button id="hopBtn" aria-label="건너뛰기">▶</button>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Title -->
    <div id="titleScreen" class="overlay">
      <div class="game-title">🌋 곶자왈 용암에서<br>살아남기 🌳</div>
      <div class="game-sub">돌을 밟고 용암을 건너 아름다운 곶자왈로 가자!</div>
      <div class="howto">
        🕹️ <b>→ 방향키</b> 또는 <b>화면 터치 / ▶버튼</b>으로 다음 돌로 점프!<br>
        ⏰ 돌은 곧 가라앉아요. 머뭇거리면 풍덩! <b>빨리빨리</b> 건너요.<br>
        ❓ <b>금빛 돌</b>에 닿으면 곶자왈 퀴즈! 맞히면 <b>점수·아이템·목숨</b>을 줘요.<br>
        🚩 마지막 문제를 풀면 용암이 <b>초록빛 곶자왈</b>로 변해요!
      </div>
      <button id="startBtn" class="btn">게임 시작 🚀</button>
    </div>

    <!-- Quiz modal -->
    <div id="quizModal" class="overlay hidden">
      <div class="quiz-card">
        <span id="quizTopic" class="quiz-topic">곶자왈 퀴즈</span>
        <div id="quizQ" class="quiz-q"></div>
        <div id="quizOptions" class="quiz-options"></div>
        <div id="quizFeedback" class="quiz-feedback"></div>
        <div id="quizExplain" class="quiz-explain"></div>
        <div class="quiz-next hidden" id="quizNextWrap">
          <button id="quizNextBtn" class="btn">계속하기 👣</button>
        </div>
      </div>
    </div>

    <!-- End screen -->
    <div id="endScreen" class="overlay hidden">
      <div id="endTitle" class="end-title"></div>
      <div id="endScore" class="end-score"></div>
      <div class="name-row">
        <input id="nameInput" maxlength="6" placeholder="이름" />
        <button id="saveScoreBtn" class="btn" style="padding:10px 20px;font-size:16px;">기록 저장</button>
      </div>
      <div class="rank-box">
        <h3>🏆 명예의 전당 (랭킹)</h3>
        <ol id="rankList" class="rank-list"></ol>
      </div>
      <button id="restartBtn" class="btn green">다시 도전 🔁</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  // ---------- helpers ----------
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const rand = (a, b) => a + Math.random() * (b - a);
  const TAU = Math.PI * 2;

  // ---------- sound ----------
  let actx = null;
  function tone(freq, dur, type = "square", vol = 0.05) {
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(vol, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
      o.start(); o.stop(actx.currentTime + dur);
    } catch (e) {}
  }
  const sfx = {
    hop: () => tone(520, 0.10, "triangle", 0.06),
    correct: () => { tone(660, 0.12, "triangle", 0.07); setTimeout(() => tone(880, 0.16, "triangle", 0.07), 110); },
    wrong: () => tone(130, 0.30, "sawtooth", 0.06),
    reward: () => { tone(784, 0.1, "square", 0.05); setTimeout(() => tone(1047, 0.16, "square", 0.05), 90); },
    fall: () => tone(90, 0.45, "sawtooth", 0.07),
    win: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.22, "triangle", 0.07), i * 150)); }
  };

  // ---------- quiz bank ----------
  // a[0] = 정답
  const QUIZZES = [
    // 1) 만들어지는 과정
    { topic: "곶자왈이 생긴 과정", q: "곶자왈은 무엇이 흘러내려 굳어서 만들어진 땅일까요?", a: ["뜨거운 용암", "바닷물", "눈과 얼음"], ex: "화산에서 흘러나온 뜨거운 용암이 식고 굳으면서 울퉁불퉁한 곶자왈이 만들어졌어요." },
    { topic: "곶자왈이 생긴 과정", q: "곶자왈 바닥에 돌이 울퉁불퉁하고 구멍이 많은 까닭은?", a: ["용암이 식으며 굳어서", "사람이 일부러 파서", "비가 깎아서"], ex: "용암이 식을 때 가스가 빠져나가 구멍이 숭숭 생긴 돌(현무암)이 되었어요." },
    { topic: "곶자왈이 생긴 과정", q: "곶자왈 땅에 구멍이 많아서 비가 오면 물은 어떻게 될까요?", a: ["땅속으로 쏙쏙 스며들어요", "그냥 다 말라버려요", "위로 솟구쳐요"], ex: "구멍 사이로 빗물이 땅속으로 잘 스며들어 깨끗한 지하수가 돼요." },
    // 2) 소중한 이유
    { topic: "곶자왈이 소중한 이유", q: "곶자왈 숲이 우리에게 만들어 주는 고마운 것은?", a: ["맑은 공기와 깨끗한 물", "매연과 먼지", "시끄러운 소리"], ex: "곶자왈은 공기를 맑게 하고 깨끗한 물을 만들어 주는 제주의 보물 숲이에요." },
    { topic: "곶자왈이 소중한 이유", q: "곶자왈에는 다른 곳에서 보기 힘든 무엇이 많이 살까요?", a: ["귀한 동물과 식물", "자동차", "높은 빌딩"], ex: "곶자왈에는 희귀한 동물과 식물이 함께 사는 소중한 보금자리예요." },
    { topic: "곶자왈이 소중한 이유", q: "곶자왈은 빗물을 모아 무엇을 만들어 줄까요?", a: ["깨끗한 지하수", "쓰레기", "용암"], ex: "곶자왈로 스며든 빗물은 깨끗한 지하수가 되어 사람들이 마시는 물이 돼요." },
    // 3) 파괴되는 이유
    { topic: "곶자왈이 사라지는 이유", q: "곶자왈이 점점 사라지는 가장 큰 까닭은?", a: ["건물·도로를 만들려고 나무를 베어서", "비가 너무 자주 와서", "동물이 많아져서"], ex: "사람들이 건물과 도로를 만들려고 숲을 밀어버리면 곶자왈이 사라져요." },
    { topic: "곶자왈이 사라지는 이유", q: "곶자왈에 쓰레기를 함부로 버리면 어떻게 될까요?", a: ["동물과 식물이 병들어요", "숲이 더 예뻐져요", "물이 깨끗해져요"], ex: "버려진 쓰레기는 흙과 물을 더럽혀 동물과 식물을 아프게 해요." },
    { topic: "곶자왈이 사라지는 이유", q: "곶자왈의 나무를 마구 베면 그 안에 살던 동물들은?", a: ["살 곳을 잃어요", "더 행복해져요", "도시로 놀러 가요"], ex: "나무가 사라지면 동물들은 집과 먹이를 잃고 살기 힘들어져요." },
    // 4) 지키는 행동
    { topic: "곶자왈을 지키는 방법", q: "곶자왈을 지키려면 우리가 할 수 있는 일은?", a: ["쓰레기를 되가져오기", "꽃을 마구 꺾기", "큰 소리로 떠들기"], ex: "내가 가져간 쓰레기는 도로 가져와 숲을 깨끗하게 지켜요." },
    { topic: "곶자왈을 지키는 방법", q: "곶자왈 숲을 걸을 때 바른 행동은?", a: ["정해진 길로만 다니기", "아무 데나 막 들어가기", "나무에 낙서하기"], ex: "정해진 길(탐방로)로만 다녀야 풀과 동물의 집을 밟지 않아요." },
    { topic: "곶자왈을 지키는 방법", q: "곶자왈에서 예쁜 식물을 보면 어떻게 할까요?", a: ["꺾지 않고 눈으로만 보기", "집에 가져가기", "밟고 지나가기"], ex: "식물은 꺾지 않고 눈으로만 보아야 다음 친구들도 볼 수 있어요." },
    { topic: "곶자왈을 지키는 방법", q: "곶자왈을 오래오래 지키려면 나무를?", a: ["심고 아껴 주기", "다 베어 버리기", "불태우기"], ex: "나무를 심고 아끼면 곶자왈이 더 푸르고 건강해져요." }
  ];

  // ---------- game config ----------
  const TARGET_QUIZ = 5;          // 마지막 퀴즈까지 풀어야 하는 문제 수
  const STONE_GAP = 145;          // 돌 사이 간격(월드 좌표)
  const PLAYER_SCREEN_X = 300;    // 화면상 캐릭터 x 위치
  const SINK_TIME = [4.6, 3.3, 2.3];   // 스테이지별 가라앉는 시간(초)
  const SCORE_MUL = [1, 1.5, 2];

  // ---------- state ----------
  let state = "TITLE"; // TITLE, PLAYING, QUIZ, TRANSFORM, END
  let stones = [], genN = 0, quizzesPlaced = 0, finalDone = false;
  let goalIndex = null;
  let forceFinalNext = false;
  let player = null;
  let cameraX = 0;
  let particles = [];
  let shake = 0;
  let transformT = 0, greenness = 0;
  let lastWon = false;
  let elapsed = 0, bubbleTimer = 0;
  let quizPool = [];
  let currentQuizStone = null, currentQuiz = null, answered = false;

  function newGame() {
    stones = []; genN = 0; quizzesPlaced = 0; finalDone = false;
    goalIndex = null; forceFinalNext = false; particles = []; shake = 0;
    transformT = 0; greenness = 0; elapsed = 0; bubbleTimer = 0;
    cameraX = 0;
    quizPool = shuffle(QUIZZES.slice());
    player = {
      idx: 0, lives: 3, score: 0, distance: 0,
      px: 0, py: 0, hopping: false, hopT: 0, hopFrom: 0, hopTo: 0,
      sinkT: 0, grace: 1.2, fallSave: false, bob: 0, facing: 1,
      quizzesSolved: 0
    };
    ensureStones();
    const s = stones[0];
    player.px = s.worldX; player.py = s.worldY;
    cameraX = player.px - PLAYER_SCREEN_X;
    state = "PLAYING";
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function stageOf(idx) { return idx < 8 ? 0 : idx < 16 ? 1 : 2; }

  function ensureStones() {
    const need = (player ? player.idx : 0) + 7;
    while (genN <= need && (goalIndex === null || genN <= goalIndex)) {
      const n = genN;
      const worldX = 300 + n * STONE_GAP;
      let worldY = 372 + Math.sin(n * 0.7) * 30;
      worldY = clamp(worldY, 344, 410);
      let type = "normal", isFinal = false;
      if (finalDone && goalIndex !== null && n >= goalIndex) {
        type = "goal";
      } else if (forceFinalNext) {
        type = "quiz"; isFinal = true; forceFinalNext = false;
      } else if (n > 0 && n % 4 === 0 && !finalDone && quizzesPlaced < TARGET_QUIZ) {
        type = "quiz"; quizzesPlaced++;
        if (quizzesPlaced >= TARGET_QUIZ) isFinal = true;
      }
      stones[n] = { n, worldX, worldY, type, used: false, safe: false, isFinal, sinkAnim: 0 };
      genN++;
    }
  }

  // ---------- input ----------
  function hopForward() {
    if (state !== "PLAYING" || player.hopping) return;
    ensureStones();
    const to = player.idx + 1;
    if (!stones[to]) return;
    player.hopping = true; player.hopT = 0;
    player.hopFrom = player.idx; player.hopTo = to;
    player.facing = 1;
    sfx.hop();
  }

  window.addEventListener("keydown", (e) => {
    if (["ArrowRight", "ArrowUp", " ", "Spacebar", "d", "D"].includes(e.key)) {
      e.preventDefault();
      if (state === "TITLE") return;
      hopForward();
    } else if (e.key === "Enter") {
      if (state === "TITLE") startGame();
    }
  });

  canvas.addEventListener("pointerdown", () => { if (state === "PLAYING") hopForward(); });
  document.getElementById("hopBtn").addEventListener("pointerdown", (e) => { e.preventDefault(); hopForward(); });

  // ---------- quiz flow ----------
  function openQuiz(stone) {
    state = "QUIZ";
    currentQuizStone = stone;
    answered = false;
    if (quizPool.length === 0) quizPool = shuffle(QUIZZES.slice());
    const base = quizPool.shift();
    // 보기 섞기
    const opts = base.a.map((text, i) => ({ text, correct: i === 0 }));
    shuffle(opts);
    currentQuiz = { topic: base.topic, q: base.q, ex: base.ex, opts };

    document.getElementById("quizTopic").textContent = "❓ " + base.topic + (stone.isFinal ? " · 마지막 문제!" : "");
    document.getElementById("quizQ").textContent = base.q;
    const ob = document.getElementById("quizOptions");
    ob.innerHTML = "";
    opts.forEach((o, i) => {
      const b = document.createElement("button");
      b.className = "quiz-opt";
      b.textContent = o.text;
      b.onclick = () => answerQuiz(i, b);
      ob.appendChild(b);
    });
    document.getElementById("quizFeedback").textContent = "";
    document.getElementById("quizExplain").textContent = "";
    document.getElementById("quizNextWrap").classList.add("hidden");
    document.getElementById("quizModal").classList.remove("hidden");
  }

  function answerQuiz(i, btn) {
    if (answered) return;
    answered = true;
    const opt = currentQuiz.opts[i];
    const buttons = [...document.querySelectorAll(".quiz-opt")];
    buttons.forEach((b, j) => {
      b.disabled = true;
      if (currentQuiz.opts[j].correct) b.classList.add("correct");
    });
    const fb = document.getElementById("quizFeedback");
    document.getElementById("quizExplain").textContent = "💡 " + currentQuiz.ex;
    const stone = currentQuizStone;
    stone.used = true;

    if (opt.correct) {
      sfx.correct();
      player.quizzesSolved++;
      fb.textContent = "⭕ 정답이에요! 멋져요!";
      fb.style.color = "#2f9e44";
      spawnSparkles();
      if (stone.isFinal) {
        finalDone = true;
        goalIndex = player.idx + 2;
        ensureStones();
        if (stones[player.idx + 1]) stones[player.idx + 1].safe = true;
        if (stones[goalIndex]) { stones[goalIndex].type = "goal"; stones[goalIndex].safe = true; }
        fb.textContent = "🎉 마지막 문제 정답! 안전한 곳이 보여요!";
      } else {
        giveReward();
      }
    } else {
      btn.classList.add("wrong");
      sfx.wrong();
      fb.textContent = "❌ 아쉬워요! 목숨 -1";
      fb.style.color = "#e03131";
      player.lives--;
      shake = 0.4;
      if (stone.isFinal && player.lives > 0) {
        forceFinalNext = true; // 다음 돌에서 다시 마지막 문제 도전
      }
    }
    document.getElementById("quizNextWrap").classList.remove("hidden");
  }

  function giveReward() {
    const pick = Math.random();
    let msg;
    if (pick < 0.30) {
      player.score += 300; msg = "💎 보너스 +300점!";
    } else if (pick < 0.55) {
      player.lives = Math.min(5, player.lives + 1); msg = "❤️ 목숨 +1!";
    } else if (pick < 0.80) {
      // 돌다리: 앞쪽 돌 3개가 안 가라앉음
      ensureStones();
      for (let k = 1; k <= 3; k++) if (stones[player.idx + k]) stones[player.idx + k].safe = true;
      msg = "🪨 튼튼한 돌다리! 앞쪽 3칸 안전!";
    } else {
      player.fallSave = true; msg = "🪂 낙하산! 한 번 떨어져도 안전!";
    }
    sfx.reward();
    showToast(msg);
  }

  document.getElementById("quizNextBtn").onclick = () => {
    document.getElementById("quizModal").classList.add("hidden");
    if (player.lives <= 0) { endGame(false); return; }
    player.sinkT = 0; player.grace = 1.6;
    state = "PLAYING";
  };

  // ---------- fall / death ----------
  function fall() {
    if (player.fallSave) {
      player.fallSave = false;
      player.sinkT = 0; player.grace = 2.0;
      showToast("🪂 낙하산이 구해줬어요!");
      sfx.reward();
      return;
    }
    player.lives--;
    sfx.fall();
    shake = 0.6;
    spawnSplash();
    if (player.lives <= 0) { endGame(false); return; }
    player.sinkT = 0; player.grace = 2.4; // 잠깐 안전
    showToast("😵 풍덩! 목숨 -1");
  }

  // ---------- toast ----------
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1700);
  }

  // ---------- particles ----------
  function spawnSparkles() {
    for (let i = 0; i < 18; i++) {
      particles.push({ type: "spark", x: PLAYER_SCREEN_X, y: 360, vx: rand(-3, 3), vy: rand(-5, -1), life: 1, col: ["#ffd24a", "#fff", "#b6f06a"][i % 3], r: rand(2, 5) });
    }
  }
  function spawnSplash() {
    const sx = PLAYER_SCREEN_X;
    for (let i = 0; i < 24; i++) {
      particles.push({ type: "splash", x: sx, y: 420, vx: rand(-4, 4), vy: rand(-8, -2), life: 1, col: ["#ff7a18", "#ffb12e", "#ff4500"][i % 3], r: rand(3, 7) });
    }
  }
  function spawnConfetti() {
    for (let i = 0; i < 60; i++) {
      particles.push({ type: "confetti", x: rand(0, W), y: rand(-60, 0), vx: rand(-1, 1), vy: rand(2, 5), life: 1, col: ["#ffd24a", "#ff6b6b", "#6bd1ff", "#b6f06a", "#ff9ff3"][i % 5], r: rand(4, 8), rot: rand(0, TAU), vr: rand(-0.2, 0.2) });
    }
  }

  // ---------- update ----------
  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000; last = now;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    elapsed += dt;
    if (shake > 0) shake = Math.max(0, shake - dt);

    // particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.type !== "confetti") p.vy += 0.35;
      else { p.vy += 0.05; p.rot += p.vr; }
      p.life -= dt * (p.type === "confetti" ? 0.4 : 1.2);
    }
    particles = particles.filter(p => p.life > 0 && p.y < H + 40);

    // lava bubbles (visual)
    bubbleTimer -= dt;
    if (bubbleTimer <= 0 && (state === "PLAYING" || state === "QUIZ")) {
      bubbleTimer = rand(0.12, 0.32);
      const lavaTop = lavaTopY();
      particles.push({ type: "bubble", x: rand(0, W), y: lavaTop + rand(0, 60), vx: rand(-0.3, 0.3), vy: rand(-1.4, -0.6), life: rand(0.6, 1.2), col: "rgba(255,200,80,", r: rand(3, 9) });
    }

    if (state === "PLAYING") {
      // hop animation
      if (player.hopping) {
        player.hopT += dt * 3.4;
        const t = clamp(player.hopT, 0, 1);
        const a = stones[player.hopFrom], b = stones[player.hopTo];
        player.px = lerp(a.worldX, b.worldX, t);
        player.py = lerp(a.worldY, b.worldY, t) - Math.sin(Math.PI * t) * 70;
        if (t >= 1) {
          player.hopping = false;
          player.idx = player.hopTo;
          onLand();
        }
      } else {
        player.bob += dt * 4;
        const cur = stones[player.idx];
        player.py = cur.worldY + Math.sin(player.bob) * 2;
        // sinking
        if (player.grace > 0) {
          player.grace -= dt;
        } else if (!cur.safe && cur.type !== "goal") {
          player.sinkT += dt;
          const thr = SINK_TIME[stageOf(player.idx)];
          cur.sinkAnim = clamp(player.sinkT / thr, 0, 1);
          player.py = cur.worldY + cur.sinkAnim * 30 + Math.sin(player.bob) * 2;
          if (player.sinkT >= thr) { fall(); }
        }
      }
      // camera follow
      cameraX = lerp(cameraX, player.px - PLAYER_SCREEN_X, 0.12);
    }

    if (state === "TRANSFORM") {
      transformT += dt;
      greenness = clamp(transformT / 2.6, 0, 1);
      player.bob += dt * 4;
      if (Math.random() < 0.4) spawnConfetti();
      if (transformT >= 2.8) endGame(true);
    }
  }

  function onLand() {
    const s = stones[player.idx];
    player.distance++;
    player.score += Math.round(12 * SCORE_MUL[stageOf(player.idx)]);
    player.sinkT = 0; player.grace = 0.35;
    ensureStones();
    // cull far-behind stones to keep memory light (keep index integrity by not reindexing)
    if (s.type === "goal") { startTransform(); return; }
    if (s.type === "quiz" && !s.used) { openQuiz(s); }
  }

  function startTransform() {
    state = "TRANSFORM";
    transformT = 0;
    player.score += 1000 + player.lives * 200;
    sfx.win();
    spawnConfetti();
  }

  // ---------- screen helpers ----------
  function lavaTopY() { return 430; }

  // ---------- draw ----------
  function draw() {
    ctx.save();
    if (shake > 0) {
      ctx.translate(rand(-1, 1) * shake * 14, rand(-1, 1) * shake * 14);
    }
    drawScene();
    ctx.restore();
  }

  function drawScene() {
    const g = greenness;
    // sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, mixColor("#ff7b3a", "#7ec8ff", g));
    sky.addColorStop(0.55, mixColor("#ffb45e", "#cfeeff", g));
    sky.addColorStop(1, mixColor("#5a2410", "#bde6a0", g));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // sun / clouds
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = mixColor("#ffe08a", "#fff7c8", g);
    ctx.beginPath(); ctx.arc(W - 130, 110, 56, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;

    // distant background hills
    drawHills(g);

    // lava / river
    drawLava(g);

    // stones + player (camera space)
    drawStones(g);
    if (player) drawPlayer(g);

    // foreground particles
    drawParticles();

    // HUD
    if (state === "PLAYING" || state === "QUIZ" || state === "TRANSFORM") drawHUD();
  }

  function drawHills(g) {
    const baseY = 360;
    ctx.fillStyle = mixColor("#7a2e14", "#5fae54", g);
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 40) {
      ctx.lineTo(x, baseY - 60 * Math.abs(Math.sin(x * 0.01 + 1)));
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
    // 변신 후 나무들
    if (g > 0.25) {
      ctx.globalAlpha = clamp((g - 0.25) / 0.5, 0, 1);
      for (let i = 0; i < 7; i++) {
        const tx = 70 + i * 130, ty = baseY - 24;
        ctx.fillStyle = "#5a3a1a";
        ctx.fillRect(tx - 5, ty, 10, 34);
        ctx.fillStyle = ["#3fae3f", "#2f9e44", "#67c23a"][i % 3];
        ctx.beginPath(); ctx.arc(tx, ty - 6, 26, 0, TAU); ctx.fill();
        ctx.beginPath(); ctx.arc(tx - 18, ty + 6, 18, 0, TAU); ctx.fill();
        ctx.beginPath(); ctx.arc(tx + 18, ty + 6, 18, 0, TAU); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function drawLava(g) {
    const top = lavaTopY();
    // 강(용암 -> 시냇물)
    const lg = ctx.createLinearGradient(0, top, 0, H);
    if (g < 0.5) {
      lg.addColorStop(0, mixColor("#ffd84a", "#9fe0ff", g * 2));
      lg.addColorStop(0.4, mixColor("#ff7a18", "#6fc6f5", g * 2));
      lg.addColorStop(1, mixColor("#c81e00", "#2f86c9", g * 2));
    } else {
      lg.addColorStop(0, "#bfeaff");
      lg.addColorStop(0.4, "#6fc6f5");
      lg.addColorStop(1, "#2f86c9");
    }
    ctx.fillStyle = lg;
    ctx.fillRect(0, top, W, H - top);

    // surface glow lines
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = g < 0.5 ? mixColor("#fff1b0", "#ffffff", g * 2) : "#ffffff";
    ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const yy = top + 18 + i * 26;
      for (let x = 0; x <= W; x += 24) {
        const off = Math.sin(x * 0.03 + elapsed * 2 + i) * 5;
        if (x === 0) ctx.moveTo(x, yy + off); else ctx.lineTo(x, yy + off);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawStones(g) {
    for (let i = Math.max(0, (player ? player.idx : 0) - 2); i < stones.length; i++) {
      const s = stones[i];
      if (!s) continue;
      const sx = s.worldX - cameraX;
      if (sx < -100 || sx > W + 100) continue;
      const sink = (player && player.idx === i && !player.hopping) ? s.sinkAnim || 0 : 0;
      const sy = s.worldY + sink * 30 + 36;

      if (s.type === "goal") {
        // 초록 안전지대(곶자왈 땅)
        ctx.fillStyle = "#3fae3f";
        roundRect(sx - 70, sy - 10, 140, 46, 14); ctx.fill();
        ctx.fillStyle = "#2f8b34";
        roundRect(sx - 70, sy + 10, 140, 26, 12); ctx.fill();
        ctx.font = "26px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚩", sx, sy - 16);
        ctx.font = "bold 13px sans-serif"; ctx.fillStyle = "#fff";
        ctx.fillText("안전한 곶자왈", sx, sy + 28);
        continue;
      }

      // 돌 그림자(용암 위)
      ctx.globalAlpha = 0.25 * (1 - sink);
      ctx.fillStyle = "#000";
      ctx.beginPath(); ctx.ellipse(sx, sy + 24, 46 * (1 - sink * 0.5), 10, 0, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;

      // 돌 몸체
      let body = s.safe ? "#6bbf59" : "#7d7066";
      let top = s.safe ? "#8fd97c" : "#9c8d80";
      if (s.type === "quiz" && !s.used) { body = "#e0a92e"; top = "#ffd24a"; }
      ctx.globalAlpha = clamp(1 - sink * 0.85, 0.15, 1);
      ctx.fillStyle = body;
      roundRect(sx - 46, sy - 6, 92, 34, 12); ctx.fill();
      ctx.fillStyle = top;
      ctx.beginPath(); ctx.ellipse(sx, sy - 4, 46, 14, 0, 0, TAU); ctx.fill();
      // 이끼/질감
      ctx.fillStyle = s.safe ? "#4f9e3f" : "rgba(0,0,0,0.12)";
      ctx.beginPath(); ctx.ellipse(sx - 16, sy - 2, 9, 4, 0, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx + 18, sy + 2, 7, 3, 0, 0, TAU); ctx.fill();

      if (s.type === "quiz" && !s.used) {
        ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
        ctx.fillStyle = "#fff";
        const fl = Math.sin(elapsed * 4) * 4;
        ctx.fillText("❓", sx, sy - 22 + fl);
      }
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = "left";
  }

  function drawPlayer(g) {
    const sx = player.px - cameraX;
    const sy = player.py;
    ctx.save();
    ctx.translate(sx, sy);
    const tilt = player.hopping ? Math.sin(player.hopT * Math.PI) * 0.25 * player.facing : 0;
    ctx.rotate(tilt);
    // 다리
    ctx.fillStyle = "#3a4a8a";
    ctx.fillRect(-9, -8, 6, 14);
    ctx.fillRect(3, -8, 6, 14);
    // 몸(티셔츠)
    ctx.fillStyle = "#ff5a3c";
    roundRect(-13, -28, 26, 24, 8); ctx.fill();
    // 팔
    ctx.fillStyle = "#ffcf9e";
    ctx.fillRect(-17, -24, 5, 14);
    ctx.fillRect(12, -24, 5, 14);
    // 머리
    ctx.fillStyle = "#ffd9b0";
    ctx.beginPath(); ctx.arc(0, -38, 13, 0, TAU); ctx.fill();
    // 머리카락
    ctx.fillStyle = "#3a2418";
    ctx.beginPath(); ctx.arc(0, -42, 13, Math.PI, TAU); ctx.fill();
    ctx.fillRect(-13, -44, 26, 5);
    // 눈
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.arc(-4, -37, 1.8, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -37, 1.8, 0, TAU); ctx.fill();
    // 입(웃음)
    ctx.strokeStyle = "#c0392b"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, -33, 4, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
    // 가방
    ctx.fillStyle = "#2f9e44";
    roundRect(-16, -26, 6, 16, 3); ctx.fill();
    ctx.restore();

    // 낙하산 표시
    if (player.fallSave) {
      ctx.font = "18px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("🪂", sx, sy - 58);
      ctx.textAlign = "left";
    }
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.type === "bubble") {
        ctx.fillStyle = p.col + clamp(p.life, 0, 1).toFixed(2) + ")";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
      } else if (p.type === "confetti") {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.col; ctx.globalAlpha = clamp(p.life, 0, 1);
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
        ctx.restore(); ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = p.col; ctx.globalAlpha = clamp(p.life, 0, 1);
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawHUD() {
    // 점수
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(14, 14, 230, 46, 12); ctx.fill();
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 24px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("⭐ " + player.score + "점", 28, 45);

    // 목숨
    ctx.font = "22px sans-serif";
    let lifeStr = "";
    for (let i = 0; i < player.lives; i++) lifeStr += "❤️";
    ctx.textAlign = "right";
    ctx.fillText(lifeStr || "💀", W - 18, 44);

    // 스테이지
    const st = stageOf(player.idx) + 1;
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(W / 2 - 95, 14, 190, 34, 10); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif";
    const speedTxt = ["느림", "빠름", "매우 빠름"][st - 1];
    ctx.fillText(`스테이지 ${st}/3 · ${speedTxt}`, W / 2, 38);

    // 마지막 퀴즈 진행도
    ctx.font = "14px sans-serif"; ctx.fillStyle = "#ffe9b0";
    ctx.fillText(`곶자왈 퀴즈 ${Math.min(player.quizzesSolved, TARGET_QUIZ)}/${TARGET_QUIZ}`, W / 2, 58);

    ctx.textAlign = "left";
  }

  // ---------- drawing utils ----------
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function mixColor(c1, c2, t) {
    t = clamp(t, 0, 1);
    const a = hex(c1), b = hex(c2);
    const r = Math.round(lerp(a[0], b[0], t));
    const g = Math.round(lerp(a[1], b[1], t));
    const bl = Math.round(lerp(a[2], b[2], t));
    return `rgb(${r},${g},${bl})`;
  }
  function hex(c) {
    const n = parseInt(c.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  // ---------- ranking ----------
  const RANK_KEY = "gotjawal_ranking_v1";
  function loadRanking() {
    try { return JSON.parse(localStorage.getItem(RANK_KEY)) || []; } catch (e) { return []; }
  }
  function saveRanking(list) {
    try { localStorage.setItem(RANK_KEY, JSON.stringify(list)); } catch (e) {}
  }
  function renderRanking(highlightIdx) {
    const list = loadRanking();
    const ol = document.getElementById("rankList");
    ol.innerHTML = "";
    const medals = ["🥇", "🥈", "🥉"];
    if (list.length === 0) {
      const li = document.createElement("li");
      li.textContent = "아직 기록이 없어요. 첫 도전자가 되어 보세요!";
      ol.appendChild(li);
      return;
    }
    list.slice(0, 8).forEach((r, i) => {
      const li = document.createElement("li");
      if (i === highlightIdx) li.className = "me";
      const left = document.createElement("span");
      left.innerHTML = `<span class="rank-medal">${medals[i] || (i + 1)}</span>${escapeHtml(r.name)} ${r.won ? "🌳" : ""}`;
      const right = document.createElement("span");
      right.textContent = r.score + "점";
      li.appendChild(left); li.appendChild(right);
      ol.appendChild(li);
    });
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])); }

  let pendingScore = null;
  document.getElementById("saveScoreBtn").onclick = () => {
    if (pendingScore == null) return;
    let name = document.getElementById("nameInput").value.trim() || "꼬마탐험가";
    name = name.slice(0, 6);
    localStorage.setItem("gotjawal_lastname", name);
    const list = loadRanking();
    const entry = { name, score: pendingScore.score, won: pendingScore.won, date: Date.now() };
    list.push(entry);
    list.sort((a, b) => b.score - a.score);
    const idx = list.indexOf(entry);
    saveRanking(list);
    pendingScore = null;
    document.getElementById("nameInput").disabled = true;
    document.getElementById("saveScoreBtn").disabled = true;
    renderRanking(idx);
  };

  // ---------- screens ----------
  function startGame() {
    document.getElementById("titleScreen").classList.add("hidden");
    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("quizModal").classList.add("hidden");
    newGame();
  }
  document.getElementById("startBtn").onclick = startGame;
  document.getElementById("restartBtn").onclick = startGame;

  function endGame(won) {
    state = "END";
    lastWon = won;
    const es = document.getElementById("endScreen");
    es.classList.remove("hidden");
    es.classList.toggle("lose", !won);
    document.getElementById("endTitle").textContent = won ? "🌳 곶자왈에 도착! 🎉" : "🌋 앗, 용암에 빠졌어요!";
    document.getElementById("endScore").textContent = (won ? "용암을 모두 건넜어요! " : "") + "최종 점수: " + player.score + "점";
    // ranking save UI
    pendingScore = { score: player.score, won };
    const ni = document.getElementById("nameInput");
    ni.disabled = false; ni.value = localStorage.getItem("gotjawal_lastname") || "";
    document.getElementById("saveScoreBtn").disabled = false;
    renderRanking(-1);
  }

  // ---------- boot ----------
  renderRanking(-1);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
