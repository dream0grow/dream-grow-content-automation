<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>곶자왈 곤충 탐험대 🐛</title>
<style>
  :root{
    --leaf:#3f7d36; --leaf-dark:#2c5a26; --bark:#6b4a2b; --bark-dark:#4a3119;
    --rock:#8d9aa0; --rock-dark:#5f6a70; --cream:#fff8e7; --gold:#ffcb45;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%, #6fae57, #2f6b3a 60%, #224d2c);
    color:#2a2a2a; overflow:hidden; user-select:none;
    display:flex; align-items:center; justify-content:center; min-height:100dvh;
  }
  #app{width:min(960px,100vw); height:min(640px,100dvh); position:relative;}

  /* ---------- 공통 화면 ---------- */
  .screen{position:absolute; inset:0; display:none; flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- 인트로 / 결과 ---------- */
  .card{
    margin:auto; width:min(440px,90%); background:var(--cream);
    border-radius:26px; padding:26px 24px; text-align:center;
    box-shadow:0 14px 40px rgba(0,0,0,.35); border:4px solid #fff;
  }
  .card h1{margin:.1em 0 .2em; font-size:1.9rem; color:#2c5a26;}
  .card h2{margin:.1em 0 .3em; font-size:1.5rem; color:#2c5a26;}
  .card p{font-size:1.02rem; line-height:1.6; margin:.5em 0;}
  .rules{text-align:left; background:#fff; border-radius:16px; padding:14px 16px; margin:14px 0; font-size:.98rem; line-height:1.7;}
  .rules b{color:#b5651d;}
  .btn{
    display:inline-block; margin-top:14px; padding:14px 30px; border:none;
    border-radius:999px; font-size:1.2rem; font-weight:800; color:#3a2a00;
    background:linear-gradient(180deg,#ffe07a,var(--gold));
    box-shadow:0 6px 0 #c9962a, 0 10px 18px rgba(0,0,0,.25); cursor:pointer;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 #c9962a;}

  /* ---------- HUD ---------- */
  #hud{
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    background:rgba(20,50,25,.55); backdrop-filter:blur(4px); color:#fff;
    font-weight:700; font-size:1rem; flex-wrap:wrap;
  }
  #hud .box{background:rgba(255,255,255,.16); padding:5px 10px; border-radius:12px; display:flex; align-items:center; gap:4px;}
  #dex{display:flex; gap:5px; margin-left:auto;}
  #dex .slot{
    width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.18);
    border:2px dashed rgba(255,255,255,.5); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:.7rem;
  }
  #dex .slot img{width:100%; height:100%; object-fit:cover;}
  #dex .slot.done{border-style:solid; border-color:var(--gold);}

  /* ---------- 무대 ---------- */
  #stage{
    position:relative; flex:1;
    background:
      radial-gradient(120% 60% at 50% -10%, #bfe39a 0%, transparent 55%),
      linear-gradient(180deg,#5d8f4a 0%, #3e6b34 45%, #5b4a32 75%, #4a3a26 100%);
    overflow:hidden;
  }
  #stage::after{ /* 바닥 낙엽 느낌 */
    content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(rgba(90,60,30,.25) 1.5px, transparent 2px);
    background-size:26px 26px; opacity:.5;
  }
  .obj{position:absolute; transform:translate(-50%,-50%); cursor:pointer; transition:transform .08s; touch-action:manipulation;}
  .obj:active{transform:translate(-50%,-50%) scale(.93);}
  .obj.used{pointer-events:none; opacity:.55; filter:grayscale(.4);}

  /* 돌 */
  .rock{width:84px; height:62px;}
  .rock .body{
    width:100%; height:100%; border-radius:50% 50% 45% 45%/60% 60% 40% 40%;
    background:radial-gradient(circle at 35% 30%, #aab4b9, var(--rock) 55%, var(--rock-dark));
    box-shadow:inset -6px -8px 12px rgba(0,0,0,.35), 0 8px 10px rgba(0,0,0,.3);
    position:relative;
  }
  .rock .moss{position:absolute; left:8%; bottom:0; width:84%; height:42%;
    background:radial-gradient(circle at 30% 40%, #7fae4d, transparent 60%),
              radial-gradient(circle at 70% 60%, #6fa043, transparent 55%);
    border-radius:0 0 45% 45%/0 0 100% 100%; opacity:.85;}
  /* 단서: 곤충 흔적(반짝) / 숨골(구멍) */
  .clue{position:absolute; top:-10px; left:50%; transform:translateX(-50%);
    font-size:1.1rem; animation:bob 1.1s ease-in-out infinite;}
  .hole{position:absolute; left:50%; top:52%; transform:translate(-50%,-50%);
    width:40%; height:46%; border-radius:50%;
    background:radial-gradient(circle at 50% 35%, #000 35%, #1c1c1c 70%, #2c2c2c);
    box-shadow:inset 0 4px 8px rgba(0,0,0,.9);}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}

  /* 나무 */
  .tree{width:90px; height:150px;}
  .tree .trunk{position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:26px; height:88px; border-radius:10px;
    background:linear-gradient(90deg,var(--bark-dark),var(--bark) 50%,var(--bark-dark));}
  .tree .canopy{position:absolute; left:50%; top:0; transform:translateX(-50%);
    width:90px; height:80px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #6fbf52, var(--leaf) 60%, var(--leaf-dark));
    box-shadow:inset -8px -10px 16px rgba(0,0,0,.25);}
  .tree .sign{position:absolute; left:50%; top:30px; transform:translateX(-50%);
    font-size:1.5rem; font-weight:900; color:#fff; text-shadow:0 2px 3px rgba(0,0,0,.4);}
  /* 죽은 나무 (기울고 잎 없음) */
  .tree.dead{transform:translate(-50%,-50%) rotate(-13deg);}
  .tree.dead .trunk{height:104px; width:22px;
    background:linear-gradient(90deg,#3c2c1c,#6a5236 50%,#3c2c1c);}
  .tree.dead .branch{position:absolute; left:50%; bottom:70px; width:54px; height:8px;
    background:#5a4630; transform:translateX(-30%) rotate(-25deg); border-radius:6px;}
  .tree.dead .branch.b2{bottom:48px; transform:translateX(-70%) rotate(22deg); width:44px;}
  .tree.dead .warn{position:absolute; left:50%; top:6px; transform:translateX(-50%); font-size:1.3rem;}

  .tag{position:absolute; left:50%; bottom:-16px; transform:translateX(-50%);
    font-size:.72rem; font-weight:800; color:#fff; background:rgba(0,0,0,.45);
    padding:1px 7px; border-radius:8px; white-space:nowrap;}

  /* ---------- 토스트 ---------- */
  #toast{position:absolute; left:50%; bottom:20px; transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,.82); color:#fff; padding:12px 20px; border-radius:14px;
    font-size:1.05rem; font-weight:700; opacity:0; transition:.25s; pointer-events:none; max-width:88%; text-align:center;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- 모달(퀴즈 / 곤충발견) ---------- */
  #overlay{position:absolute; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:20; padding:14px;}
  #overlay.show{display:flex;}
  .modal{background:var(--cream); width:min(420px,94%); border-radius:22px; padding:22px; text-align:center; box-shadow:0 14px 40px rgba(0,0,0,.4); border:4px solid #fff;}
  .modal h3{margin:.1em 0 .5em; font-size:1.35rem; color:#2c5a26;}
  .modal .photo{width:200px; height:150px; object-fit:cover; border-radius:16px; border:4px solid #fff; box-shadow:0 6px 14px rgba(0,0,0,.3); background:#dfe7d6;}
  .ph-fallback{width:200px; height:150px; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#cfe0bf; border:4px solid #fff; font-size:3rem;}
  .choices{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  .choice{padding:13px; border-radius:14px; border:3px solid #d9c89a; background:#fff; font-size:1.08rem; font-weight:700; cursor:pointer;}
  .choice:active{transform:scale(.97);}
  .choice.correct{background:#cdeeb5; border-color:#5ea03a;}
  .choice.wrong{background:#f6c7c7; border-color:#cf5b5b;}
  .fact{font-size:1rem; line-height:1.6; margin:12px 4px;}

  /* 화면 흔들림 */
  @keyframes shake{0%,100%{transform:translate(0,0);}20%{transform:translate(-8px,4px);}40%{transform:translate(8px,-3px);}60%{transform:translate(-6px,5px);}80%{transform:translate(6px,-4px);}}
  .shake{animation:shake .4s;}

  @media(max-width:560px){
    .rock{width:70px;height:52px;} .tree{width:74px;height:128px;}
    .tree .canopy{width:74px;height:66px;} .tree .trunk{height:72px;}
    .card h1{font-size:1.6rem;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- 인트로 -->
  <section id="intro" class="screen active">
    <div class="card">
      <h1>🌿 곶자왈 곤충 탐험대 🐛</h1>
      <p>곶자왈에 숨은 곤충 <b>3마리</b>를 모두 찾아 도감을 채워요!</p>
      <div class="rules">
        🪨 <b>돌</b>을 톡! → 곤충이 나와요. 하지만 <b>어두운 구멍(숨골)</b>은 빠지면 목숨 ↓<br>
        🌳 <b>푸른 나무(❓)</b>를 톡! → 퀴즈를 맞히면 <b>잠자리채·채집통</b>을 만들어요<br>
        🪵 <b>쓰러질 듯 기운 죽은 나무</b>는 건드리면 위험해요! 목숨 ↓<br>
        🔎 곤충은 알맞은 도구가 있어야 잡을 수 있어요<br>
        ❤️ 목숨 3개로 시작 — 잘 보고 톡! 누르세요
      </div>
      <button class="btn" onclick="startGame()">탐험 시작! ▶</button>
    </div>
  </section>

  <!-- 게임 -->
  <section id="game" class="screen">
    <div id="hud">
      <div class="box" id="lives">❤️❤️❤️</div>
      <div class="box" id="tools">🛠️ 도구 없음</div>
      <div class="box" id="count">🐛 0 / 3</div>
      <div id="dex"></div>
    </div>
    <div id="stage"></div>
    <div id="toast"></div>
  </section>

  <!-- 결과 -->
  <section id="result" class="screen">
    <div class="card">
      <h2 id="result-title">🎉 곶자왈 지킴이 성공!</h2>
      <p id="result-msg"></p>
      <div id="result-dex" style="display:flex; gap:10px; justify-content:center; margin:14px 0; flex-wrap:wrap;"></div>
      <button class="btn" onclick="startGame()">다시 도전 🔁</button>
    </div>
  </section>

  <!-- 모달 -->
  <div id="overlay"><div class="modal" id="modal"></div></div>
</div>

<script>
/* =========================================================
   곶자왈 곤충 탐험대 — 스테이지 1 (곤충 3마리)
   곤충 사진: 위키미디어 공용(자유 라이선스) 직링크
   ========================================================= */

// 실제 곶자왈/한국 서식 곤충 — 위키미디어 공용 이미지
const FP = "https://commons.wikimedia.org/wiki/Special:FilePath/";
const INSECTS = {
  beetle: {
    name:"넓적사슴벌레", emoji:"🪲", tool:"box",
    img: FP + "Lucanidae%20-%20Dorcus%20titanus-002.JPG?width=480",
    fact:"멋진 큰 뿔처럼 보이는 건 사실 <b>큰 턱</b>이에요. 밤에 나무 수액을 먹고 힘겨루기를 해요!"
  },
  mantis: {
    name:"왕사마귀", emoji:"🦗", tool:"net",
    img: FP + "Tenodera%20sinensis%20(Chinese%20praying%20mantis)%20(Newark,%20Ohio,%20USA)%201%20(31503867486).jpg?width=480",
    fact:"낫처럼 생긴 <b>앞다리</b>로 먹이를 꽉 잡는 곶자왈의 사냥꾼이에요."
  },
  waterbug: {
    name:"물장군", emoji:"🐛", tool:"box",
    img: FP + "Lethocerus%20deyrollei.jpg?width=480",
    fact:"곶자왈 <b>물웅덩이</b>에 사는 우리나라에서 가장 큰 물벌레! 멸종위기종이라 아주 귀해요."
  }
};

// 퀴즈 (2학년 눈높이)
const QUIZZES = [
  {q:"물장군은 어디에서 살까요?", a:["물웅덩이 속","뜨거운 사막","하얀 눈 위"], c:0},
  {q:"사슴벌레의 큰 뿔처럼 보이는 건 사실 무엇일까요?", a:["큰 턱(입)","긴 코","꼬리"], c:0},
  {q:"사마귀는 앞다리로 무엇을 할까요?", a:["먹이를 잡아요","헤엄쳐요","땅을 파요"], c:0},
  {q:"곶자왈에서 깊고 어두운 구멍(숨골)을 보면?", a:["손대지 않고 피해요","손을 쑥 넣어요"], c:0},
  {q:"곤충은 다리가 모두 몇 개일까요?", a:["6개","4개","8개"], c:0}
];

// 위치 슬롯
const TREE_SLOTS = [ {x:14,y:26},{x:40,y:18},{x:64,y:22},{x:87,y:30} ];
const ROCK_SLOTS = [ {x:11,y:56},{x:30,y:72},{x:49,y:55},{x:67,y:70},
                     {x:86,y:58},{x:20,y:88},{x:51,y:87},{x:82,y:86} ];

let state;
const $ = s => document.querySelector(s);
const stage = $("#stage");

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]];} return a; }

function startGame(){
  state = { lives:3, tools:[], caught:[], quizIdx:0 };
  showScreen("game");
  buildStage();
  updateHUD();
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $("#"+id).classList.add("active");
  $("#overlay").classList.remove("show");
}

/* ---------- 무대 만들기 ---------- */
function buildStage(){
  stage.innerHTML = "";

  // 나무 역할: 푸른나무(퀴즈) 2 + 죽은나무(위험) 2
  const treeRoles = shuffle(["quiz","quiz","dead","dead"]);
  shuffle(TREE_SLOTS).forEach((p,i)=> addTree(p, treeRoles[i]));

  // 돌 역할: 곤충3 + 숨골2 + 빈돌2 + 하트1
  const insectKeys = Object.keys(INSECTS); // beetle, mantis, waterbug
  const rockRoles = shuffle([
    {t:"insect",k:insectKeys[0]},{t:"insect",k:insectKeys[1]},{t:"insect",k:insectKeys[2]},
    {t:"hole"},{t:"hole"},{t:"empty"},{t:"empty"},{t:"heart"}
  ]);
  shuffle(ROCK_SLOTS).forEach((p,i)=> addRock(p, rockRoles[i]));
}

function place(el,p){ el.style.left=p.x+"%"; el.style.top=p.y+"%"; stage.appendChild(el); }

function addTree(p, role){
  const el = document.createElement("div");
  el.className = "obj tree" + (role==="dead" ? " dead" : "");
  if(role==="dead"){
    el.innerHTML = `<div class="warn">⚠️</div><div class="branch"></div><div class="branch b2"></div><div class="trunk"></div>`;
  }else{
    el.innerHTML = `<div class="canopy"></div><div class="sign">❓</div><div class="trunk"></div>`;
  }
  el.onclick = ()=> tapTree(el, role);
  place(el,p);
}

function addRock(p, role){
  const el = document.createElement("div");
  el.className = "obj rock";
  let inner = `<div class="body"><div class="moss"></div></div>`;
  if(role.t==="hole")   inner += `<div class="hole"></div>`;
  if(role.t==="insect") inner += `<div class="clue">✨</div>`;   // 곤충 흔적 단서
  el.innerHTML = inner;
  el.onclick = ()=> tapRock(el, role);
  place(el,p);
}

/* ---------- 상호작용 ---------- */
function tapTree(el, role){
  if(el.classList.contains("used")) return;
  if(role==="dead"){
    loseLife("🪵 죽은 나무가 쓰러졌어요! 조심!");
    el.classList.add("used");
  }else{
    openQuiz(el);
  }
}

function tapRock(el, role){
  if(el.classList.contains("used")) return;
  if(role.t==="hole"){
    loseLife("🕳️ 숨골에 빠졌어요! 어두운 구멍은 피해요.");
    el.classList.add("used");
  }else if(role.t==="heart"){
    state.lives++; updateHUD();
    el.classList.add("used"); toast("❤️ 숨은 하트 발견! 목숨 +1");
  }else if(role.t==="empty"){
    el.classList.add("used"); toast("🍃 여긴 아무것도 없네요.");
  }else if(role.t==="insect"){
    const ins = INSECTS[role.k];
    if(state.tools.includes(ins.tool)){
      el.classList.add("used");
      catchInsect(role.k);
    }else{
      const need = ins.tool==="net" ? "잠자리채 🥅" : "채집통 🪣";
      toast(`${ins.emoji} ${ins.name} 발견! ${need}가 필요해요. 나무 퀴즈로 만들어요!`);
      // 흔적 강조
      const c = el.querySelector(".clue"); if(c) c.textContent = ins.emoji;
    }
  }
}

/* ---------- 퀴즈 ---------- */
function openQuiz(treeEl){
  const quiz = QUIZZES[state.quizIdx % QUIZZES.length];
  state.quizIdx++;
  const m = $("#modal");
  m.innerHTML = `<h3>🌳 곶자왈 퀴즈</h3><p style="font-size:1.1rem;font-weight:700">${quiz.q}</p>
    <div class="choices">${quiz.a.map((t,i)=>`<button class="choice" data-i="${i}">${t}</button>`).join("")}</div>`;
  $("#overlay").classList.add("show");
  m.querySelectorAll(".choice").forEach(btn=>{
    btn.onclick = ()=>{
      const i = +btn.dataset.i;
      if(i===quiz.c){
        btn.classList.add("correct");
        setTimeout(()=>{ $("#overlay").classList.remove("show"); rewardTool(treeEl); }, 550);
      }else{
        btn.classList.add("wrong");
        setTimeout(()=>btn.classList.remove("wrong"), 600);
        toast("아쉬워요! 다시 한 번 생각해봐요 🤔");
      }
    };
  });
}

function rewardTool(treeEl){
  treeEl.classList.add("used");
  if(!state.tools.includes("box")){
    state.tools.push("box"); toast("🪣 채집통을 만들었어요! 사슴벌레·물장군을 잡을 수 있어요.");
  }else if(!state.tools.includes("net")){
    state.tools.push("net"); toast("🥅 잠자리채를 만들었어요! 사마귀를 잡을 수 있어요.");
  }else{
    state.lives++; toast("도구가 충분해요! 보너스 목숨 ❤️ +1");
  }
  updateHUD();
}

/* ---------- 채집 ---------- */
function catchInsect(key){
  const ins = INSECTS[key];
  state.caught.push(key);
  updateHUD();
  const m = $("#modal");
  m.innerHTML = `<h3>${ins.emoji} ${ins.name} 채집 성공!</h3>
    <img class="photo" src="${ins.img}" alt="${ins.name}"
         onerror="this.outerHTML='<div class=&quot;ph-fallback&quot;>${ins.emoji}<div style=&quot;font-size:1rem;margin-top:6px&quot;>${ins.name}</div></div>'">
    <p class="fact">${ins.fact}</p>
    <button class="btn" onclick="closePopup()">좋아요! 👍</button>`;
  $("#overlay").classList.add("show");
}

function closePopup(){
  $("#overlay").classList.remove("show");
  if(state.caught.length>=3) win();
}

/* ---------- 목숨 / HUD ---------- */
function loseLife(msg){
  state.lives--; updateHUD(); toast(msg);
  $("#app").classList.add("shake");
  setTimeout(()=>$("#app").classList.remove("shake"), 420);
  if(state.lives<=0) setTimeout(lose, 700);
}

function updateHUD(){
  $("#lives").textContent = state.lives>0 ? "❤️".repeat(state.lives) : "💀";
  const tnames = [];
  if(state.tools.includes("box")) tnames.push("🪣채집통");
  if(state.tools.includes("net")) tnames.push("🥅잠자리채");
  $("#tools").textContent = tnames.length ? "🛠️ "+tnames.join(" ") : "🛠️ 도구 없음";
  $("#count").textContent = `🐛 ${state.caught.length} / 3`;
  // 도감
  const keys = Object.keys(INSECTS);
  $("#dex").innerHTML = keys.map(k=>{
    const done = state.caught.includes(k); const ins = INSECTS[k];
    return done
      ? `<div class="slot done"><img src="${ins.img}" alt="${ins.name}" onerror="this.parentNode.textContent='${ins.emoji}'"></div>`
      : `<div class="slot">?</div>`;
  }).join("");
}

/* ---------- 토스트 ---------- */
let toastTimer;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 2300);
}

/* ---------- 종료 ---------- */
function win(){
  $("#result-title").textContent = "🎉 곶자왈 지킴이 성공!";
  $("#result-msg").innerHTML = `곤충 3마리를 모두 찾았어요!<br>남은 목숨 ❤️ ${state.lives}개. 정말 멋진 탐험가예요!`;
  fillResultDex(); showScreen("result");
}
function lose(){
  $("#result-title").textContent = "😢 목숨을 모두 잃었어요";
  $("#result-msg").innerHTML = `${state.caught.length}마리를 찾았어요.<br>숨골과 죽은 나무를 잘 피해서 다시 도전해요!`;
  fillResultDex(); showScreen("result");
}
function fillResultDex(){
  $("#result-dex").innerHTML = Object.keys(INSECTS).map(k=>{
    const ins=INSECTS[k]; const done=state.caught.includes(k);
    return `<div style="text-align:center;width:90px">
      <div class="slot ${done?'done':''}" style="width:80px;height:80px;margin:auto">
        ${done?`<img src="${ins.img}" onerror="this.parentNode.textContent='${ins.emoji}'">`:'❓'}
      </div>
      <div style="color:#2c5a26;font-weight:800;font-size:.85rem;margin-top:4px">${done?ins.name:'？'}</div>
    </div>`;
  }).join("");
}
</script>
</body>
