# 드림그로우 매일 콘텐츠 발제
# 하루 1회 새 주제를 자동 발제해 볼트(vault/파이프라인/)에 intake 카드를 만든다.
# 이후는 orchestrator(cron)가 리서치→키워드(자동승인)→초안→검수까지 진행하고,
# 초안이 완성되면 텔레그램으로 알린다. 사람은 마지막 발행 승인만 한다.
name: daily-intake

on:
  schedule:
    # 매일 22:10 UTC = 익일 07:10 KST (아침에 새 주제가 올라와 하루 중 초안까지 준비됨)
    - cron: "10 22 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "이번에 만들 주제 수 (비우면 기본값)"
        required: false

concurrency:
  group: daily-intake
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      DG_DAILY_TOPIC_COUNT: ${{ github.event.inputs.count || secrets.DG_DAILY_TOPIC_COUNT }}
      DG_DEFAULT_AUDIENCE: ${{ secrets.DG_DEFAULT_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests python-dotenv honcho-ai pyyaml

      # ANTHROPIC_API_KEY가 없으면 Claude Max 구독(CLAUDE_CODE_OAUTH_TOKEN)으로 실행
      - name: Install Claude Code CLI (Max 구독 인증용)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily topics
        run: python3 -m orchestrator.daily_intake

      # 새로 만든 intake 카드를 볼트에 커밋·push (git이 유일한 동기화 경로)
      - name: 볼트 카드 커밋
        run: |
          python3 tools/vault_secret_scan.py vault/ --quiet
          git config user.name "daily-intake[bot]"
          git config user.email "actions@github.com"
          git add vault/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "매일 발제: intake 카드 $(date +%Y-%m-%d)"
          pushed=0
          for i in 1 2 3 4 5; do
            git pull --rebase origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then pushed=1; break; fi
            echo "push 경합, 재시도 $i/5"; sleep $((RANDOM % 4 + 2))
          done
          [ "$pushed" = 1 ]
