name: Deploy games to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "games/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload games folder as site
        uses: actions/upload-pages-artifact@v3
        with:
          path: games

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
