# 카드뉴스 실제 생성 (수동 실행)
# 주제만 입력하면: 초안 → 카드뉴스(한국인 배경, 표지 영상/사진 판단) → PNG 아티팩트로 업로드.
name: test-cardnews

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "카드뉴스 주제 (비우면 오늘의 주제 자동 발제)"
        required: false
      body_count:
        description: "본문 카드 수 (기본 5)"
        required: false
        default: "5"
      video_url:
        description: "표지 영상 URL(힉스필드 등) — 메타에 기록"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      DG_IMAGE_PROVIDER: ${{ secrets.DG_IMAGE_PROVIDER }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      DG_STOCK_PROVIDER: ${{ secrets.DG_STOCK_PROVIDER }}
      DG_PHOTO_ORDER: ${{ secrets.DG_PHOTO_ORDER }}
      DG_CARDNEWS_HANDLE: ${{ secrets.DG_CARDNEWS_HANDLE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install requests python-dotenv honcho-ai pyyaml playwright
          python -m playwright install --with-deps chromium

      - name: Install Claude Code CLI (Max 구독 인증용)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate cardnews
        env:
          DG_CHROME_PATH: ""
        run: |
          python3 -m orchestrator.cardnews \
            --topic "${{ github.event.inputs.topic }}" \
            --body-count "${{ github.event.inputs.body_count || '5' }}" \
            --video-url "${{ github.event.inputs.video_url }}" \
            --out cardnews_out

      - name: Upload cards + editor
        uses: actions/upload-artifact@v4
        with:
          name: cardnews
          path: |
            cardnews_out/*.png
            cardnews_out/editor.html
            cardnews_out/cardnews_plan.json
