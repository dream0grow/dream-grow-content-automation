# 드림그로우 24시간 오케스트레이터 (설계 결정 #4)
# 30분마다 노션 콘텐츠 파이프라인 DB를 폴링하여 다음 stage를 실행한다.
# 핸드폰(노션 모바일)에서 카드 생성/승인만 하면 나머지는 여기서 돌아간다.
name: orchestrator

on:
  schedule:
    # 정각(00/30분)은 GitHub 부하로 자주 누락되므로 비켜서 15분마다 실행
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "특정 stage만 실행 (비우면 전체)"
        required: false

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_PIPELINE_DB_ID: ${{ secrets.NOTION_PIPELINE_DB_ID }}
      NOTION_MENTION_USER_ID: ${{ secrets.NOTION_MENTION_USER_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
      HONCHO_API_KEY: ${{ secrets.HONCHO_API_KEY }}
      DG_AUTO_APPROVE_KEYWORD: ${{ secrets.DG_AUTO_APPROVE_KEYWORD }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
      NAVER_AD_SECRET: ${{ secrets.NAVER_AD_SECRET }}
      NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
      STIBEE_API_KEY: ${{ secrets.STIBEE_API_KEY }}
      STIBEE_LIST_ID: ${{ secrets.STIBEE_LIST_ID }}
      STIBEE_SENDER_EMAIL: ${{ secrets.STIBEE_SENDER_EMAIL }}
      STIBEE_SENDER_NAME: ${{ secrets.STIBEE_SENDER_NAME }}
      STIBEE_AUTO_SEND: ${{ secrets.STIBEE_AUTO_SEND }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests python-dotenv honcho-ai

      # ANTHROPIC_API_KEY가 없으면 Claude Max 구독(CLAUDE_CODE_OAUTH_TOKEN)으로 실행
      - name: Install Claude Code CLI (Max 구독 인증용)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Run orchestrator
        run: |
          if [ -n "${{ github.event.inputs.stage }}" ]; then
            python3 -m orchestrator.run --stage "${{ github.event.inputs.stage }}"
          else
            python3 -m orchestrator.run
          fi
