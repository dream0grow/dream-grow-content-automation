# 드림그로우 24시간 오케스트레이터 (설계 결정 #4)
# 30분마다 노션 콘텐츠 파이프라인 DB를 폴링하여 다음 stage를 실행한다.
# 핸드폰(노션 모바일)에서 카드 생성/승인만 하면 나머지는 여기서 돌아간다.
name: orchestrator

on:
  schedule:
    # 정각(00/30분)은 GitHub 부하로 자주 누락되므로 비켜서 15분마다 실행
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "특정 stage만 실행 (비우면 전체)"
        required: false

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_PIPELINE_DB_ID: ${{ secrets.NOTION_PIPELINE_DB_ID }}
      NOTION_MENTION_USER_ID: ${{ secrets.NOTION_MENTION_USER_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
      HONCHO_API_KEY: ${{ secrets.HONCHO_API_KEY }}
      DG_AUTO_APPROVE_KEYWORD: ${{ secrets.DG_AUTO_APPROVE_KEYWORD }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
      NAVER_AD_SECRET: ${{ secrets.NAVER_AD_SECRET }}
      NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
      STIBEE_API_KEY: ${{ secrets.STIBEE_API_KEY }}
      STIBEE_LIST_ID: ${{ secrets.STIBEE_LIST_ID }}
      STIBEE_SENDER_EMAIL: ${{ secrets.STIBEE_SENDER_EMAIL }}
      STIBEE_SENDER_NAME: ${{ secrets.STIBEE_SENDER_NAME }}
      STIBEE_AUTO_SEND: ${{ secrets.STIBEE_AUTO_SEND }}
      # 카드 저장소 백엔드: notion(기본) | obsidian — Variables에서 전환 (이관설계 M1)
      DG_STATE_BACKEND: ${{ vars.DG_STATE_BACKEND }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests python-dotenv honcho-ai pyyaml

      # ANTHROPIC_API_KEY가 없으면 Claude Max 구독(CLAUDE_CODE_OAUTH_TOKEN)으로 실행
      - name: Install Claude Code CLI (Max 구독 인증용)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Run orchestrator
        run: |
          if [ -n "${{ github.event.inputs.stage }}" ]; then
            python3 -m orchestrator.run --stage "${{ github.event.inputs.stage }}"
          else
            python3 -m orchestrator.run
          fi

      # 옵시디언 백엔드일 때: 카드 변경분을 볼트에 커밋 (노션 모드에선 변경이 없어 생략됨)
      - name: 볼트 카드 커밋
        if: ${{ env.DG_STATE_BACKEND == 'obsidian' }}
        run: |
          python3 tools/vault_secret_scan.py vault/ --quiet
          git config user.name "orchestrator[bot]"
          git config user.email "actions@github.com"
          git add vault/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "오케스트레이터: 카드 갱신 $(date +%Y-%m-%dT%H:%M)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
