version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dreamgrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dreamgrow}
      POSTGRES_DB: ${POSTGRES_DB:-dreamgrow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dreamgrow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dreamgrow}:${POSTGRES_PASSWORD:-dreamgrow}@postgres:5432/${POSTGRES_DB:-dreamgrow}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8000:8000"
    volumes:
      - pdf_data:/data/pdfs
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dreamgrow}:${POSTGRES_PASSWORD:-dreamgrow}@postgres:5432/${POSTGRES_DB:-dreamgrow}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - pdf_data:/data/pdfs
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dreamgrow}:${POSTGRES_PASSWORD:-dreamgrow}@postgres:5432/${POSTGRES_DB:-dreamgrow}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: celery -A apps.worker.celery_app beat --loglevel=info

  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/Dockerfile.web
    env_file: ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  postgres_data:
  pdf_data:
